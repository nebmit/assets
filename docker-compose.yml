# Docker Compose for local development: database only.
# Run the app and worker from npm scripts so production deployment stays owned
# by the infra repo compose file.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=assets
      - POSTGRES_USER=assets
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-assets}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assets -d assets"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
